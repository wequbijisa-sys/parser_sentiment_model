services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # Example model endpoint placeholder. Replace this service with your model API.
  http-echo:
    image: hashicorp/http-echo:1.0
    command: ["-listen=:8080", "-text={\"prediction\":\"placeholder\"}"]
    ports:
      - "8080:8080"

volumes:
  minio-data:
